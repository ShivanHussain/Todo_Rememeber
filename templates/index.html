
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ToDo Remember</title>
     <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.jpg') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>

<h1 class="app-title">📝 ToDo Remember</h1>

<div id="spinner-overlay">
    <div class="spinner"></div>
</div>

<form class="task-form" method="POST" action="/add">
    <input name="title" placeholder="Task title" required>
    <input name="description" placeholder="Description">
    <button>Add</button>
</form>

<h2 class="section-title pending-title">🟡 Start / Pending</h2>

<table>
<tr><th>Task</th><th>Description</th><th>Status</th><th>Action</th></tr>
{% for t in active_tasks %}
<tr>
<td>{{ t[1] }}</td>
<td>
    {{ t[2] if t[2] else "—" }}
    <form method="POST" action="/update-desc/{{ t[0] }}">
        <input name="description" placeholder="Update">
        <button class="desc-btn">✏️</button>
    </form>
</td>
<td class="{{ t[3]|lower }}">{{ t[3] }}</td>
<td>
    <a href="/status/{{ t[0] }}" class="link-btn">Next</a> |
    <a href="/delete/{{ t[0] }}" class="link-btn">Delete</a>
</td>
</tr>
{% endfor %}
</table>

<h2 class="section-title complete-title">✅ Completed</h2>

<table>
<tr><th>Task</th><th>Status</th></tr>
{% for t in completed_tasks %}
<tr>
<td>{{ t[1] }}</td>
<td class="complete">Complete</td>
</tr>
{% endfor %}
</table>

<script>
    const spinner = document.getElementById("spinner-overlay");

    document.querySelectorAll("form").forEach(f => {
        f.addEventListener("submit", () => spinner.style.display = "flex");
    });

    document.querySelectorAll("a.link-btn").forEach(a => {
        a.addEventListener("click", () => spinner.style.display = "flex");
    });

    window.addEventListener("pageshow", () => {
        spinner.style.display = "none";
    });

    window.addEventListener("error", () => {
        spinner.style.display = "none";
        alert("Database temporarily unavailable. Try again.");
    });
</script>

</body>
</html>
