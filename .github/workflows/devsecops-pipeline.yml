name: DevSecOps end to end Pipeline

on:
    workflow_dispatch:


jobs:

    code-quality:
        uses: ./.github/workflows/code-check.yml
    secrets-scan:
        uses: ./.github/workflows/secrets-scan.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
        uses: ./.github/workflows/dockerfile-scan.yml


    sonarqube-scan:
        needs: [code-quality, secrets-scan, dependency-scan, docker-scan]
        uses: ./.github/workflows/sonarqube-scan.yml
        secrets: inherit

    build:
        needs: sonarqube-scan
        uses: ./.github/workflows/build-and-push.yml
        secrets: inherit


    trivy:
        needs: build
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit

    deploy:
        needs: trivy
        uses: ./.github/workflows/deploy-app.yml
        secrets: inherit

    